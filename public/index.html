<!DOCTYPE html>
<html>
<!--I chose lusturia and lato for my Google Fonts because they looked intruiging and they complement each other by adding a visual hierarchy and contrast in size and weight. I used the font weights 400 and 100.
I made my typography responsive by using media query to change the size of font to 2rem when in mobile mode. I optimized my images by making them clickable and stackable when in mobile mode by using columns. I used the file type .jpeg because it's the most commonly used file type for photos and it gives me the quality of photos I need.
I made the information on my website change size and stack to be responsive. These changes can be seen on by navigation bar, my text, and my collections page.-->
<!--I used CSS variables to standardize my color scheme across all pages of my website including the navigation links. I also used CSs variables to change the spacing on my main page.
I transformed the images on my collections page to make users more aware of where they're going on my website. My animation fades in the the logo to make the website more interesting and dynamic-->
    <head>
        <title>Home</title>
        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="icon" type="image/x-icon" href="favicon.png">
    </head>

    <body>
      <nav class="navbar">
